<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<title>PLG · Bảng Lương</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#1E4FB8"/>
<link rel="icon" type="image/svg+xml" href="logo-cardiy-mark.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1E4FB8 0%,#1565C0 50%,#0D47A1 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-card{background:#fff;border-radius:1.25rem;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-logo{display:flex;align-items:center;gap:.75rem;justify-content:center;margin-bottom:2rem}
.login-logo img{height:52px;max-width:160px;object-fit:contain}
.login-logo span{font-size:1.5rem;font-weight:800;color:#1E4FB8}
.login-logo span b{color:#f59e0b}
.login-title{text-align:center;margin-bottom:1.75rem}
.login-title h2{font-size:1.35rem;font-weight:700;color:#1a1a2e;margin-bottom:.4rem}
.login-title p{font-size:.875rem;color:#64748b}
.form-group{margin-bottom:1.25rem}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
.form-group select,.form-group input{width:100%;padding:.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:.625rem;font-size:.95rem;font-family:inherit;color:#1a1a2e;background:#f8fafc;transition:border-color .2s}
.form-group select:focus,.form-group input:focus{outline:none;border-color:#1E4FB8;background:#fff}
.btn-login{width:100%;padding:.875rem;background:linear-gradient(135deg,#1E4FB8,#1565C0);color:#fff;border:none;border-radius:.625rem;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:.5rem}
.btn-login:hover{opacity:.9}
.login-note{text-align:center;margin-top:1.25rem;font-size:.8rem;color:#94a3b8}
.err-msg{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:.5rem;padding:.75rem 1rem;font-size:.875rem;margin-bottom:1rem;display:none}
.dashboard{display:none;min-height:100vh;background:#f1f5f9;flex-direction:column}
.topbar{background:linear-gradient(90deg,#1E4FB8,#1565C0);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.topbar__left{display:flex;align-items:center;gap:.75rem}
.topbar__logo{font-size:1.1rem;font-weight:800}
.topbar__logo span{color:#fbbf24;font-size:.75rem;font-weight:600;background:rgba(255,255,255,.15);padding:.15rem .4rem;border-radius:.25rem;margin-left:.4rem}
.topbar__user{font-size:.875rem;opacity:.9}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:.4rem .9rem;border-radius:.5rem;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn-logout:hover{background:rgba(255,255,255,.25)}
.main-content{padding:1.5rem;max-width:900px;margin:0 auto;width:100%}
.welcome-banner{background:linear-gradient(135deg,#1E4FB8,#7c3aed);color:#fff;border-radius:1rem;padding:1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.25rem}
.welcome-avatar{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;flex-shrink:0}
.welcome-text h2{font-size:1.25rem;font-weight:700;margin-bottom:.25rem}
.welcome-text p{font-size:.875rem;opacity:.85}
.welcome-salary{margin-left:auto;text-align:right}
.welcome-salary .amount{font-size:1.75rem;font-weight:800}
.welcome-salary .label{font-size:.75rem;opacity:.8;text-transform:uppercase;letter-spacing:.05em}
.salary-section{background:#fff;border-radius:1rem;padding:1.5rem;margin-bottom:1.25rem;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.section-title{font-size:1rem;font-weight:700;color:#1a1a2e;margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem;padding-bottom:.75rem;border-bottom:2px solid #f1f5f9}
.section-title svg{color:#1E4FB8}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.detail-item{background:#f8fafc;border-radius:.75rem;padding:1rem;border:1px solid #e2e8f0}
.detail-item__label{font-size:.75rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.4rem}
.detail-item__value{font-size:1.1rem;font-weight:700;color:#1a1a2e}
.detail-item__sub{font-size:.75rem;color:#94a3b8;margin-top:.2rem}
.detail-item.highlight{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:#93c5fd}
.detail-item.highlight .detail-item__value{color:#1E4FB8}
.detail-item.green{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#86efac}
.detail-item.green .detail-item__value{color:#16a34a}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem}
.info-item{display:flex;flex-direction:column;gap:.25rem}
.info-item__label{font-size:.75rem;font-weight:600;color:#94a3b8;text-transform:uppercase}
.info-item__value{font-size:.9rem;font-weight:600;color:#1a1a2e}
.no-data{text-align:center;padding:3rem;color:#94a3b8}
.no-data p{font-size:.95rem}
@media(max-width:600px){
  .welcome-salary{display:none}
  .detail-grid{grid-template-columns:repeat(2,1fr)}
  .main-content{padding:1rem}
}

.tab-bar{display:flex;gap:8px;margin:0 0 20px;border-bottom:2px solid var(--bd);padding-bottom:0;}
.tab-btn{padding:10px 20px;border:none;background:none;font-size:15px;font-weight:600;color:var(--fg2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s;}
.tab-btn.active{color:var(--blu-600);border-bottom-color:var(--blu-600);}
.tab-pane{display:none;}.tab-pane.active{display:block;}
.cc-card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:var(--sh-sm);}
.cc-clock{font-size:48px;font-weight:800;letter-spacing:2px;color:var(--blu-600);text-align:center;margin:8px 0;}
.cc-date{text-align:center;color:var(--fg2);font-size:14px;margin-bottom:20px;}
.btn-checkin{width:100%;padding:16px;border-radius:12px;border:none;font-size:18px;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.5px;}
.btn-checkin.in{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;}
.btn-checkin.out{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;}
.btn-checkin:disabled{opacity:.5;cursor:not-allowed;}
.gps-status{text-align:center;font-size:13px;color:var(--fg2);margin:10px 0;min-height:20px;}
.gps-status.ok{color:#16a34a;}.gps-status.err{color:#dc2626;}
.cc-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;}
.cc-sum-item{background:#f8fafc;border-radius:12px;padding:14px;text-align:center;}
.cc-sum-val{font-size:22px;font-weight:800;color:var(--blu-600);}
.cc-sum-lbl{font-size:11px;color:var(--fg2);margin-top:2px;}
.cc-history{background:#fff;border-radius:16px;padding:20px;box-shadow:var(--sh-sm);}
.cc-history h3{font-size:14px;font-weight:700;color:var(--fg);margin:0 0 14px;}
.cc-row{display:flex;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--bd);gap:12px;}
.cc-row:last-child{border:none;}
.cc-row-date{min-width:36px;text-align:center;}
.cc-row-day{font-size:18px;font-weight:800;color:var(--blu-600);}
.cc-row-wd{font-size:10px;color:var(--fg2);}
.cc-row-info{flex:1;}
.cc-row-time{font-size:14px;font-weight:600;}
.cc-row-hrs{font-size:12px;color:var(--fg2);}
.cc-row-gps{font-size:11px;color:#16a34a;margin-top:2px;}
.cc-row-badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-ok{background:#dcfce7;color:#15803d;}
.badge-late{background:#fef9c3;color:#a16207;}
.badge-abs{background:#fee2e2;color:#dc2626;}
.notice-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px 16px;font-size:13px;color:#1d4ed8;margin-bottom:16px;}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo-plg.png" alt="PLG" style="height:44px;object-fit:contain">
      <span style="display:none"></span>
    </div>
    <div class="login-title">
      <h2>Xem bảng lương của bạn</h2>
      <p>Chọn tên và nhập mã xác nhận để tiếp tục</p>
    </div>
    <div id="err-msg" class="err-msg">Tên hoặc mã nhân viên không đúng. Vui lòng thử lại.</div>
    <div class="form-group">
      <label>Họ và tên</label>
      <select id="sel-name">
        <option value="">-- Chọn nhân viên --</option>
      </select>
    </div>
    <div class="form-group">
      <label>Mã nhân viên</label>
      <input type="text" id="inp-code" placeholder="Nhập mã của bạn..." autocomplete="off" autocapitalize="characters">
    </div>
    <button class="btn-login" id="btn-login">Xem bảng lương</button>
    <div class="login-note">Đây là trang nội bộ – chỉ dành cho nhân viên PLG</div>
  </div>
</div>
<div id="dashboard" class="dashboard">
  <div class="topbar">
    <div class="topbar__left">
      <img src="logo-plg.png" height="36" alt="PLG" style="object-fit:contain">
      <span class="topbar__logo"> <span>BẢNG LƯƠNG</span></span>
    </div>
    <div style="display:flex;align-items:center;gap:1rem">
      <span class="topbar__user" id="topbar-name"></span>
      <button class="btn-logout" id="btn-logout">Đăng xuất</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-luong" onclick="switchTab('luong')">&#x1F4B0; Bảng lương</button>
    <button class="tab-btn" id="tab-cc" onclick="switchTab('chamcong')">&#x1F4CD; Chấm công GPS</button>
  </div>
  <div id="pane-luong" class="tab-pane active"><div class="main-content" id="main-content"></div></div>
  <div id="pane-chamcong" class="tab-pane"></div>
</div>
<script>
'use strict';
const STAFF_DATA=[{id:"s1",branch:"CN2",code:"2 TRAM",name:"Nguyễn Thị Thùy Trâm",phone:"0988213331",role:"QL",position:"Quản lý CN",fixedSalary:0},{id:"s2",branch:"CN2",code:"LANH",name:"Lê Thị Lành",phone:"0944202677",role:"KT",position:"Kế toán",fixedSalary:0},{id:"s3",branch:"CN2",code:"PHƯỢNG",name:"Bùi Thị Bích Phượng",phone:"",role:"NVKD",position:"CVDV",fixedSalary:0},{id:"s4",branch:"CN2",code:"DCAO",name:"Đỗ Văn Cao",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s5",branch:"CN2",code:"THÀNH LỚN",name:"Nguyễn Văn Thành",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s6",branch:"CN2",code:"BO",name:"Lục Văn Bộ",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s7",branch:"CN2",code:"PHUC",name:"Nguyễn Hạnh Phúc",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s8",branch:"CN1",code:"DUNG",name:"Trần Thị Dung",phone:"",role:"KT",position:"Kế toán",fixedSalary:0},{id:"s9",branch:"CN1",code:"LUAN",name:"Phạm Thành Luân",phone:"",role:"QL",position:"Quản lý CN",fixedSalary:0},{id:"s10",branch:"CN1",code:"PHUONG KT",name:"Phạm Kim Phương",phone:"",role:"KT",position:"Kế toán",fixedSalary:0},{id:"s11",branch:"CN1",code:"TAM",name:"Nguyễn Chí Tâm",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s12",branch:"CN1",code:"THINH",name:"Nguyễn Đình Thịnh",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s13",branch:"CN3",code:"HOA",name:"Lê Thị Hoa",phone:"",role:"KT",position:"Kế toán",fixedSalary:0},{id:"s14",branch:"CN3",code:"DAT CN3",name:"Lê Nguyên Đạt",phone:"",role:"QL",position:"Quản lý CN",fixedSalary:0},{id:"s15",branch:"CN3",code:"KHOA",name:"Trần Minh Khoa",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s16",branch:"CN3",code:"DUC",name:"Nguyễn Hoàng Đức",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s17",branch:"CN3",code:"LONG",name:"Phan Thanh Long",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s18",branch:"CN3",code:"HUNG",name:"Vũ Mạnh Hùng",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s19",branch:"CN5",code:"TRANG CN5",name:"Nguyễn Thị Trang",phone:"",role:"QL",position:"Quản lý CN",fixedSalary:0},{id:"s20",branch:"CN5",code:"LINH CN5",name:"Đặng Thị Linh",phone:"",role:"NVKD",position:"CVDV",fixedSalary:0},{id:"s21",branch:"CN5",code:"NAM",name:"Trần Quốc Nam",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s22",branch:"CN5",code:"BINH",name:"Lê Văn Bình",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s23",branch:"CN5",code:"TUAN",name:"Nguyễn Anh Tuấn",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s24",branch:"CN5",code:"SON",name:"Phạm Văn Sơn",phone:"",role:"KTV",position:"Kỹ thuật",fixedSalary:0},{id:"s25",branch:"CN5",code:"QUYEN",name:"Hoàng Thị Quyên",phone:"",role:"NVKD",position:"CVDV",fixedSalary:0}];
const ENTRIES_DATA=[{id:"e1",staffId:"s19",date:"2026-06-01",revLop:157020000,revOther:19825000,soLop:33,congLop:0,congNgoaiLop:0,congLuuDong:0,quay:0},{id:"e2",staffId:"s19",date:"2026-06-09",revLop:80330000,revOther:4167000,soLop:20,congLop:0,congNgoaiLop:0,congLuuDong:0,quay:0},{id:"e3",staffId:"s20",date:"2026-06-01",revLop:0,revOther:0,soLop:0,congLop:2660000,congNgoaiLop:6165000,congLuuDong:0,quay:0},{id:"e4",staffId:"s20",date:"2026-06-09",revLop:0,revOther:0,soLop:0,congLop:1892000,congNgoaiLop:3050555,congLuuDong:0,quay:0},{id:"e5",staffId:"s10",date:"2026-06-01",revLop:0,revOther:0,soLop:0,congLop:0,congNgoaiLop:0,congLuuDong:0,quay:0},{id:"e6",staffId:"s11",date:"2026-06-01",revLop:0,revOther:0,soLop:0,congLop:0,congNgoaiLop:0,congLuuDong:0,quay:0},{id:"e7",staffId:"s4",date:"2026-06-01",revLop:0,revOther:0,soLop:0,congLop:0,congNgoaiLop:0,congLuuDong:0,quay:0}];
const CFG={base:4200000,xang:260000,com:780000,congChuan:26,congExtra:450000,ktvM1:10000000,ktvR1:0.1,ktvM2:20000000,ktvR2:0.15,ktvM3:30000000,ktvR3:0.2,ktvLdM1:10000000,ktvLdR1:0.3,ktvLdM2:20000000,ktvLdR2:0.4,ktvLdM3:30000000,ktvLdR3:0.5};
const SALARY_BASE={QL:12000000,KT:8940000,NVKD:7500000,KTV:7090000};
function fmtVND(n){return Math.round(n).toLocaleString('vi-VN');}
function fmtM(n){if(n>=1000000)return(n/1000000).toFixed(1).replace(/\.0$/,'')+'tr';if(n>=1000)return(n/1000).toFixed(0)+'k';return fmtVND(n);}
function getInitials(name){const parts=name.trim().split(' ');return parts.length>=2?(parts[parts.length-2][0]+parts[parts.length-1][0]).toUpperCase():name.substring(0,2).toUpperCase();}
function calcSalary(staff){
  const base=SALARY_BASE[staff.role]||CFG.base;
  if(staff.fixedSalary&&staff.fixedSalary>0)return staff.fixedSalary;
  const myE=ENTRIES_DATA.filter(e=>e.staffId===staff.id);
  let bonus=0;
  myE.forEach(e=>{
    const cong=(e.congLop||0)+(e.congNgoaiLop||0);
    const rev=(e.revLop||0)+(e.revOther||0);
    if(staff.role==='KTV'){if(cong>CFG.ktvM3)bonus+=cong*CFG.ktvR3;else if(cong>CFG.ktvM2)bonus+=cong*CFG.ktvR2;else if(cong>CFG.ktvM1)bonus+=cong*CFG.ktvR1;}
    else if(staff.role==='QL'){bonus+=(e.revLop||0)*0.005+(e.revOther||0)*0.01;}
    else if(staff.role==='NVKD'){bonus+=cong*0.12;}
    else{bonus+=(e.revLop||0)*0.002;}
  });
  return base+bonus+CFG.xang+CFG.com;
}
const sel=document.getElementById('sel-name');
STAFF_DATA.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name+' ('+s.branch+')';sel.appendChild(o);});
document.getElementById('btn-login').addEventListener('click',doLogin);
document.getElementById('inp-code').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogin(){
  const sid=document.getElementById('sel-name').value;
  const code=document.getElementById('inp-code').value.trim().toUpperCase();
  const err=document.getElementById('err-msg');
  if(!sid){err.textContent='Vui lòng chọn tên nhân viên.';err.style.display='block';return;}
  const staff=STAFF_DATA.find(s=>s.id===sid);
  if(!staff||staff.code.trim().toUpperCase()!==code){err.textContent='Mã nhân viên không đúng. Vui lòng thử lại.';err.style.display='block';document.getElementById('inp-code').focus();return;}
  err.style.display='none';
  showDashboard(staff);
}
function showDashboard(staff){
  document.getElementById('login-screen').style.display='none';
  const db=document.getElementById('dashboard');
  db.style.display='flex';
  document.getElementById('topbar-name').textContent=staff.name;
  document.body.style.cssText='background:#f1f5f9;display:block;padding:0;min-height:100vh;font-family:Inter,sans-serif';
  renderSalaryPage(staff);
}
document.getElementById('btn-logout').addEventListener('click',()=>{
  ccDestroy();
  switchTab('luong');
  document.getElementById('dashboard').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('sel-name').value='';
  document.getElementById('inp-code').value='';
  document.body.style.cssText='font-family:Inter,sans-serif;background:linear-gradient(135deg,#1E4FB8 0%,#1565C0 50%,#0D47A1 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem';
});
function renderSalaryPage(staff){
  const salary=calcSalary(staff);
  const myE=ENTRIES_DATA.filter(e=>e.staffId===staff.id);
  const initials=getInitials(staff.name);
  const baseS=SALARY_BASE[staff.role]||CFG.base;
  const bonusAmt=salary-baseS-CFG.xang-CFG.com;
  const roleLabel={QL:'Quản lý CN',KT:'Kế toán',NVKD:'Chuyên viên DV',KTV:'Kỹ thuật viên'}[staff.role]||staff.role;
  let eHtml='';
  if(myE.length===0){eHtml='<div class="no-data"><p>Chưa có dữ liệu trong kỳ này</p></div>';}
  else{myE.forEach((e,i)=>{const d=new Date(e.date).toLocaleDateString('vi-VN');const cong=(e.congLop||0)+(e.congNgoaiLop||0);eHtml+='<div class="detail-item"><div class="detail-item__label">Lần '+(i+1)+' – '+d+'</div>';if(staff.role==='KTV'){eHtml+='<div class="detail-item__value">'+fmtM(cong)+' đ</div><div class="detail-item__sub">Công: '+fmtM(e.congLop||0)+' + ngoài: '+fmtM(e.congNgoaiLop||0)+'</div>';}else{eHtml+='<div class="detail-item__value">'+fmtM((e.revLop||0)+(e.revOther||0))+' đ</div><div class="detail-item__sub">DT: '+fmtM(e.revLop||0)+' + DV: '+fmtM(e.revOther||0)+'</div>';}eHtml+='</div>';});}
  document.getElementById('main-content').innerHTML=`<div class="welcome-banner"><div class="welcome-avatar">${initials}</div><div class="welcome-text"><h2>Xin chào, ${staff.name}!</h2><p>${roleLabel} &bull; ${staff.branch}</p></div><div class="welcome-salary"><div class="amount">${fmtM(salary)}</div><div class="label">Lương dự kiến</div></div></div><div class="salary-section"><div class="section-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Tổng quan lương kỳ Tháng 6 / 2026</div><div class="detail-grid"><div class="detail-item highlight"><div class="detail-item__label">Lương tổng dự kiến</div><div class="detail-item__value">${fmtM(salary)} đ</div><div class="detail-item__sub">${fmtVND(salary)} đồng</div></div><div class="detail-item"><div class="detail-item__label">Lương cơ bản</div><div class="detail-item__value">${fmtM(baseS)} đ</div><div class="detail-item__sub">${staff.role}</div></div><div class="detail-item green"><div class="detail-item__label">Thưởng / Hiệu suất</div><div class="detail-item__value">${fmtM(Math.max(0,bonusAmt))} đ</div><div class="detail-item__sub">Dựa trên hiệu suất</div></div><div class="detail-item"><div class="detail-item__label">Phụ cấp xăng + ăn</div><div class="detail-item__value">${fmtM(CFG.xang+CFG.com)} đ</div><div class="detail-item__sub">${fmtM(CFG.xang)}+${fmtM(CFG.com)}</div></div></div></div><div class="salary-section"><div class="section-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Dữ liệu hiệu suất</div>${myE.length>0?'<div class="detail-grid">'+eHtml+'</div>':eHtml}</div><div class="salary-section"><div class="section-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Thông tin cá nhân</div><div class="info-grid"><div class="info-item"><div class="info-item__label">Họ tên</div><div class="info-item__value">${staff.name}</div></div><div class="info-item"><div class="info-item__label">Chức vụ</div><div class="info-item__value">${staff.position}</div></div><div class="info-item"><div class="info-item__label">Chi nhánh</div><div class="info-item__value">${staff.branch}</div></div><div class="info-item"><div class="info-item__label">Vai trò</div><div class="info-item__value">${roleLabel}</div></div>${staff.phone?'<div class="info-item"><div class="info-item__label">Số điện thoại</div><div class="info-item__value">'+staff.phone+'</div></div>':''}</div></div>`;
}

function switchTab(tab) {
  document.getElementById('pane-luong').classList.toggle('active', tab==='luong');
  document.getElementById('pane-chamcong').classList.toggle('active', tab==='chamcong');
  document.getElementById('tab-luong').classList.toggle('active', tab==='luong');
  document.getElementById('tab-cc').classList.toggle('active', tab==='chamcong');
  if(tab==='chamcong' && currentEmployee) {
    ccInit(currentEmployee);
  }
}

// ===== CHAM CONG GPS =====
let ccCurrentUser = null;
let ccToday = null;
let ccClockTimer = null;

function ccInit(emp) {
  ccCurrentUser = emp;
  ccUpdateClock();
  ccClockTimer = setInterval(ccUpdateClock, 1000);
  ccRender();
}

function ccDestroy() {
  if(ccClockTimer) clearInterval(ccClockTimer);
  ccCurrentUser = null;
}

function ccUpdateClock() {
  const el = document.getElementById('cc-clock');
  if(!el) return;
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  el.textContent = hh+':'+mm+':'+ss;
  const days = ['CN','T2','T3','T4','T5','T6','T7'];
  document.getElementById('cc-date').textContent = days[now.getDay()]+', '+now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear();
}

function ccKey(emp) {
  return 'PLG_CC_'+emp.code;
}

function ccGetData(emp) {
  try { return JSON.parse(localStorage.getItem(ccKey(emp))||'{}'); } catch(e){ return {}; }
}

function ccSaveData(emp, data) {
  localStorage.setItem(ccKey(emp), JSON.stringify(data));
  // Also write to shared key for salary.html to read
  ccSyncToSalary(emp, data);
}

function ccSyncToSalary(emp, data) {
  // salary.html reads PLG_ATTENDANCE key: { [empCode]: { [YYYY-MM]: { [DD]: {in,out,lat,lng,addr} } } }
  try {
    let shared = JSON.parse(localStorage.getItem('PLG_ATTENDANCE')||'{}');
    shared[emp.code] = data;
    localStorage.setItem('PLG_ATTENDANCE', JSON.stringify(shared));
  } catch(e){}
}

function ccTodayKey() {
  const now = new Date();
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  return now.getFullYear()+'-'+mm+'-'+dd;
}

function ccMonthKey() {
  const now = new Date();
  const mm = String(now.getMonth()+1).padStart(2,'0');
  return now.getFullYear()+'-'+mm;
}

function ccGetGPS(callback) {
  const statusEl = document.getElementById('cc-gps-status');
  if(statusEl) { statusEl.className='gps-status'; statusEl.textContent='Đang lấy vị trí GPS...'; }
  if(!navigator.geolocation){
    if(statusEl){statusEl.className='gps-status err';statusEl.textContent='Trình duyệt không hỗ trợ GPS';}
    callback(null);return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      if(statusEl){statusEl.className='gps-status ok';statusEl.textContent='GPS: '+lat+', '+lng;}
      // Reverse geocode via open API
      fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lng+'&format=json')
        .then(r=>r.json())
        .then(d=>{
          const addr = d.display_name ? d.display_name.split(',').slice(0,3).join(', ') : lat+','+lng;
          callback({lat,lng,addr});
        })
        .catch(()=>callback({lat,lng,addr:lat+','+lng}));
    },
    err => {
      if(statusEl){statusEl.className='gps-status err';statusEl.textContent='Không lấy được GPS: '+err.message;}
      callback(null);
    },
    {enableHighAccuracy:true,timeout:10000}
  );
}

function ccCheckIn() {
  const emp = ccCurrentUser;
  if(!emp) return;
  const btn = document.getElementById('cc-btn');
  if(btn){btn.disabled=true;btn.textContent='Đang lấy GPS...';}
  ccGetGPS(function(gps){
    const data = ccGetData(emp);
    const today = ccTodayKey();
    const month = ccMonthKey();
    if(!data[month]) data[month]={};
    const now = new Date();
    const timeStr = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    if(!data[month][today]) data[month][today]={};
    data[month][today].in = timeStr;
    data[month][today].inTs = now.getTime();
    if(gps){ data[month][today].lat=gps.lat; data[month][today].lng=gps.lng; data[month][today].addr=gps.addr; }
    ccSaveData(emp, data);
    ccRender();
    if(btn){btn.disabled=false;}
  });
}

function ccCheckOut() {
  const emp = ccCurrentUser;
  if(!emp) return;
  const btn = document.getElementById('cc-btn');
  if(btn){btn.disabled=true;btn.textContent='Đang lấy GPS...';}
  ccGetGPS(function(gps){
    const data = ccGetData(emp);
    const today = ccTodayKey();
    const month = ccMonthKey();
    if(!data[month]) data[month]={};
    if(!data[month][today]) data[month][today]={};
    const now = new Date();
    const timeStr = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    data[month][today].out = timeStr;
    data[month][today].outTs = now.getTime();
    if(gps){ data[month][today].outLat=gps.lat; data[month][today].outLng=gps.lng; data[month][today].outAddr=gps.addr; }
    ccSaveData(emp, data);
    ccRender();
    if(btn){btn.disabled=false;}
  });
}

function ccCalcHours(entry) {
  if(!entry||!entry.inTs||!entry.outTs) return null;
  const diff = (entry.outTs - entry.inTs)/3600000;
  return diff > 0 ? diff : null;
}

function ccRender() {
  const emp = ccCurrentUser;
  if(!emp) return;
  const pane = document.getElementById('pane-chamcong');
  if(!pane) return;

  const data = ccGetData(emp);
  const month = ccMonthKey();
  const today = ccTodayKey();
  const monthData = data[month]||{};
  const todayEntry = monthData[today]||{};

  // Count stats
  let totalDays=0, totalHrs=0, lateDays=0;
  const workStart = 8; // 8:00 considered start
  Object.entries(monthData).forEach(([d,e])=>{
    if(e.in){ totalDays++;
      const h = ccCalcHours(e); if(h) totalHrs+=h;
      const inH = parseInt((e.in||'0:0').split(':')[0]);
      const inM = parseInt((e.in||'0:0').split(':')[1]);
      if(inH>workStart||(inH===workStart&&inM>15)) lateDays++;
    }
  });

  // Determine button state
  const hasIn = !!todayEntry.in;
  const hasOut = !!todayEntry.out;
  let btnClass='btn-checkin in', btnText='CHECK IN', btnFn='ccCheckIn()';
  if(hasIn && !hasOut){ btnClass='btn-checkin out'; btnText='CHECK OUT'; btnFn='ccCheckOut()'; }
  if(hasIn && hasOut){ btnClass='btn-checkin in'; btnText='Đã chấm hôm nay ✓'; btnFn=''; }

  // Build history (last 15 days of this month)
  const days = Object.keys(monthData).sort().reverse().slice(0,15);
  const wds = ['CN','T2','T3','T4','T5','T6','T7'];
  let histHtml = '';
  if(days.length===0){
    histHtml = '<p style="color:var(--fg2);text-align:center;padding:20px 0;font-size:14px;">Chưa có dữ liệu chấm công tháng này</p>';
  } else {
    days.forEach(d=>{
      const e = monthData[d];
      const dt = new Date(d+'T00:00:00');
      const dayNum = dt.getDate();
      const wd = wds[dt.getDay()];
      const hrs = ccCalcHours(e);
      const inH = e.in ? parseInt(e.in.split(':')[0]) : 0;
      const inM = e.in ? parseInt(e.in.split(':')[1]) : 0;
      const isLate = e.in && (inH>workStart||(inH===workStart&&inM>15));
      const badge = !e.in ? '<span class="cc-row-badge badge-abs">Vắng</span>' : isLate ? '<span class="cc-row-badge badge-late">Trễ</span>' : '<span class="cc-row-badge badge-ok">Đúng giờ</span>';
      const gpsLine = e.addr ? '<div class="cc-row-gps">📍 '+e.addr+'</div>' : '';
      const hrsLine = hrs ? (hrs.toFixed(1)+' giờ') : (e.in && !e.out ? 'Chưa check out' : '');
      histHtml += '<div class="cc-row"><div class="cc-row-date"><div class="cc-row-day">'+dayNum+'</div><div class="cc-row-wd">'+wd+'</div></div><div class="cc-row-info"><div class="cc-row-time">'+(e.in||'--:--')+' → '+(e.out||'--:--')+'</div><div class="cc-row-hrs">'+hrsLine+'</div>'+gpsLine+'</div>'+badge+'</div>';
    });
  }

  // Today status
  let todayStatus = '';
  if(todayEntry.in && todayEntry.out){
    const hrs = ccCalcHours(todayEntry);
    todayStatus = '<div class="notice-box">✅ Hôm nay: Vào '+todayEntry.in+' — Ra '+todayEntry.out+(hrs?' ('+hrs.toFixed(1)+'h)':'')+(todayEntry.addr?' | 📍'+todayEntry.addr:'')+' </div>';
  } else if(todayEntry.in){
    todayStatus = '<div class="notice-box" style="background:#fff7ed;border-color:#fed7aa;color:#c2410c;">⏱ Đang làm việc — Check in lúc '+todayEntry.in+(todayEntry.addr?' | 📍'+todayEntry.addr:'')+' </div>';
  }

  pane.innerHTML = `
<div class="cc-card">
  <div id="cc-clock" class="cc-clock">--:--:--</div>
  <div id="cc-date" class="cc-date"></div>
  ${todayStatus}
  <div id="cc-gps-status" class="gps-status"></div>
  <button id="cc-btn" class="${btnClass}" onclick="${btnFn||'void(0)'}" ${btnFn?'':'disabled'}>${btnText}</button>
</div>
<div class="cc-summary">
  <div class="cc-sum-item"><div class="cc-sum-val">${totalDays}</div><div class="cc-sum-lbl">Ngày công</div></div>
  <div class="cc-sum-item"><div class="cc-sum-val">${totalHrs.toFixed(0)}</div><div class="cc-sum-lbl">Giờ làm</div></div>
  <div class="cc-sum-item"><div class="cc-sum-val">${lateDays}</div><div class="cc-sum-lbl">Ngày trễ</div></div>
</div>
<div class="cc-history"><h3>Lịch sử chấm công tháng ${ccMonthKey().split('-')[1]}/${ccMonthKey().split('-')[0]}</h3>${histHtml}</div>
`;
  ccUpdateClock();
}
</script>
